name: Release AppImages

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v0.1.16'
        required: true
        type: string

permissions:
  contents: write

env:
  APPIMAGE_EXTRACT_AND_RUN: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NO_STRIP: 1

jobs:
  appimage:
    name: Build AppImage ${{ matrix.variant }}
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: layershell
            with_layer_shell: ON
            require_layer_shell: ON
          - variant: nolayershell
            with_layer_shell: OFF
            require_layer_shell: OFF

    steps:
      - name: Resolve tag
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          if [ -z "$TAG" ]; then
            echo "No release tag was provided" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          {
            echo "tag=$TAG"
            echo "version=$VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.version.outputs.tag }}

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            appstream \
            ca-certificates \
            cmake \
            desktop-file-utils \
            file \
            fuse2 \
            gcc \
            layer-shell-qt \
            ninja \
            patchelf \
            pipewire \
            pkgconf \
            qt6-base \
            qt6-tools \
            qt6-wayland \
            wget

      - name: Download AppImage tools
        shell: bash
        run: |
          set -euo pipefail
          wget -q -O linuxdeploy-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q -O linuxdeploy-plugin-qt-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Configure
        run: |
          cmake -S . -B build-${{ matrix.variant }} -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DMARK_SHOT_WITH_LAYER_SHELL=${{ matrix.with_layer_shell }} \
            -DMARK_SHOT_REQUIRE_LAYER_SHELL=${{ matrix.require_layer_shell }}

      - name: Build
        run: cmake --build build-${{ matrix.variant }} --parallel

      - name: Install into AppDir
        shell: bash
        run: |
          set -euo pipefail
          APPDIR="$PWD/AppDir-${{ matrix.variant }}"
          rm -rf "$APPDIR"
          DESTDIR="$APPDIR" cmake --install build-${{ matrix.variant }}
          install -Dm644 LICENSE "$APPDIR/usr/share/licenses/mark-shot/LICENSE"
          install -Dm644 README.md "$APPDIR/usr/share/doc/mark-shot/README.md"
          install -Dm644 README.zh-CN.md "$APPDIR/usr/share/doc/mark-shot/README.zh-CN.md"

      - name: Assert LayerShellQt linkage
        shell: bash
        run: |
          set -euo pipefail
          BINARY="$PWD/AppDir-${{ matrix.variant }}/usr/bin/mark-shot"
          if [ "${{ matrix.with_layer_shell }}" = "ON" ]; then
            ldd "$BINARY" | grep -Ei 'LayerShellQt|layershell'
          else
            if ldd "$BINARY" | grep -Ei 'LayerShellQt|layershell'; then
              echo "nolayershell build unexpectedly links LayerShellQt" >&2
              exit 1
            fi
          fi

      - name: Build AppImage
        id: package
        shell: bash
        env:
          QMAKE: /usr/bin/qmake6
          VERSION: ${{ steps.version.outputs.version }}-${{ matrix.variant }}
        run: |
          set -euo pipefail
          APPDIR="$PWD/AppDir-${{ matrix.variant }}"

          ./linuxdeploy-x86_64.AppImage \
            --appdir "$APPDIR" \
            --executable "$APPDIR/usr/bin/mark-shot" \
            --desktop-file data/mark-shot.desktop \
            --icon-file data/icons/hicolor/scalable/apps/mark-shot.svg \
            --plugin qt \
            --output appimage

          mapfile -t appimages < <(find . -maxdepth 1 -type f -name '*.AppImage' \
            ! -name 'linuxdeploy-x86_64.AppImage' \
            ! -name 'linuxdeploy-plugin-qt-x86_64.AppImage' \
            -print)
          if [ "${#appimages[@]}" -ne 1 ]; then
            printf 'Expected one packaged AppImage, found %s\n' "${#appimages[@]}" >&2
            printf '%s\n' "${appimages[@]}" >&2
            exit 1
          fi

          ASSET="mark-shot-${{ steps.version.outputs.tag }}-linux-x86_64-${{ matrix.variant }}.AppImage"
          mv "${appimages[0]}" "$ASSET"
          sha256sum "$ASSET" > "$ASSET.sha256"
          {
            echo "asset=$ASSET"
            echo "checksum=$ASSET.sha256"
          } >> "$GITHUB_OUTPUT"

      - name: Upload AppImage artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: mark-shot-appimage-${{ matrix.variant }}-${{ steps.version.outputs.tag }}
          path: |
            ${{ steps.package.outputs.asset }}
            ${{ steps.package.outputs.checksum }}
          if-no-files-found: error

      - name: Upload AppImage to release
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            ${{ steps.package.outputs.asset }}
            ${{ steps.package.outputs.checksum }}
